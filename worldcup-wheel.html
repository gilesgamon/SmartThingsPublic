<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Live Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .header .live-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #ff4444;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .last-update {
            font-size: 0.9em;
            opacity: 0.7;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .groups-wheel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .group-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .group-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #FFC107);
        }

        .group-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .group-header {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: #FFC107;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .team {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .team:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .team-name {
            font-size: 1.1em;
            font-weight: 500;
        }

        .team-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 35px;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1em;
        }

        .matches-section {
            width: 100%;
        }

        .matches-title {
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
            color: #FFC107;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .match-card.live {
            border-color: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .match-group {
            font-weight: bold;
            color: #FFC107;
        }

        .match-status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .match-status.live {
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .match-status.finished {
            background: #4CAF50;
        }

        .match-status.upcoming {
            background: rgba(255, 255, 255, 0.2);
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }

        .team-name-match {
            font-size: 1.2em;
            font-weight: 600;
        }

        .team-score {
            font-size: 1.5em;
            font-weight: bold;
            color: #FFC107;
        }

        .match-date {
            margin-top: 10px;
            text-align: center;
            font-size: 0.9em;
            opacity: 0.7;
        }

        .match-date.upcoming {
            font-size: 1em;
            font-weight: 600;
            opacity: 1;
            color: #FFC107;
        }

        .match-countdown {
            margin-top: 8px;
            text-align: center;
            font-size: 0.95em;
            color: #4CAF50;
            font-weight: 500;
        }

        .match-stadium {
            margin-top: 5px;
            text-align: center;
            font-size: 0.85em;
            opacity: 0.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.5em;
        }

        .error {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #FFC107;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .groups-wheel {
                grid-template-columns: 1fr;
            }

            .matches-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚽ FIFA World Cup 2026</h1>
        <div class="subtitle">
            <span class="live-indicator"></span>
            Live Tournament Tracker
        </div>
        <div class="last-update" id="lastUpdate">Last updated: Loading...</div>
    </div>

    <div class="controls">
        <button class="btn active" id="btnGroups" onclick="showGroups()">Group Stage</button>
        <button class="btn" id="btnMatches" onclick="showMatches()">All Matches</button>
        <button class="btn" id="btnLive" onclick="showLiveMatches()">Live Matches</button>
        <button class="btn" onclick="refreshData()">🔄 Refresh</button>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading World Cup data...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="groupsContainer" style="display: none;">
            <div class="groups-wheel" id="groupsWheel"></div>
        </div>
        
        <div id="matchesContainer" style="display: none;">
            <h2 class="matches-title" id="matchesTitle">All Matches</h2>
            <div class="matches-grid" id="matchesGrid"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://worldcup26.ir';
        let allMatches = [];
        let allGroups = [];
        let allTeams = [];
        let stadiums = [];

        async function fetchData() {
            try {
                showLoading(true);
                
                const [matchesRes, groupsRes, teamsRes, stadiumsRes] = await Promise.all([
                    fetch(`${API_BASE}/get/games`),
                    fetch(`${API_BASE}/get/groups`),
                    fetch(`${API_BASE}/get/teams`),
                    fetch(`${API_BASE}/get/stadiums`)
                ]);

                if (!matchesRes.ok || !groupsRes.ok || !teamsRes.ok || !stadiumsRes.ok) {
                    throw new Error('Failed to fetch data from API');
                }

                const matchesData = await matchesRes.json();
                const groupsData = await groupsRes.json();
                const teamsData = await teamsRes.json();
                const stadiumsData = await stadiumsRes.json();

                allMatches = matchesData.games || matchesData;
                allGroups = groupsData;
                allTeams = teamsData.teams || teamsData;
                stadiums = stadiumsData.stadiums || stadiumsData;

                updateLastUpdate();
                showGroups();
                showLoading(false);
            } catch (error) {
                console.error('Error fetching data:', error);
                showError('Unable to connect to FIFA World Cup API. Please try again later.');
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function updateLastUpdate() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `Last updated: ${now.toLocaleTimeString()}`;
        }

        function showGroups() {
            setActiveButton('btnGroups');
            document.getElementById('groupsContainer').style.display = 'block';
            document.getElementById('matchesContainer').style.display = 'none';
            renderGroups();
        }

        function showMatches() {
            setActiveButton('btnMatches');
            document.getElementById('groupsContainer').style.display = 'none';
            document.getElementById('matchesContainer').style.display = 'block';
            document.getElementById('matchesTitle').textContent = 'All Matches';
            renderMatches(allMatches);
        }

        function showLiveMatches() {
            setActiveButton('btnLive');
            const liveMatches = allMatches.filter(match => 
                match.finished === 'FALSE' && 
                match.time_elapsed !== 'notstarted' &&
                match.time_elapsed !== 'FT'
            );
            
            document.getElementById('groupsContainer').style.display = 'none';
            document.getElementById('matchesContainer').style.display = 'block';
            document.getElementById('matchesTitle').textContent = 
                `Live Matches (${liveMatches.length})`;
            renderMatches(liveMatches.length > 0 ? liveMatches : allMatches.slice(0, 20));
        }

        function setActiveButton(btnId) {
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function renderGroups() {
            const container = document.getElementById('groupsWheel');
            container.innerHTML = '';

            const groupLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
            
            groupLetters.forEach(letter => {
                const groupTeams = allTeams.filter(team => team.groups === letter);
                const groupData = allGroups.find(g => g.group === letter);
                
                const card = document.createElement('div');
                card.className = 'group-card';
                
                let teamsHTML = '';
                groupTeams.forEach((team, index) => {
                    const teamStats = groupData?.teams?.find(t => t.team_id === team.id) || 
                                    { pts: '0', gf: '0', ga: '0' };
                    
                    teamsHTML += `
                        <div class="team">
                            <span class="team-name">${team.name_en || team.name_fa}</span>
                            <div class="team-stats">
                                <div class="stat">
                                    <span class="stat-label">Pts</span>
                                    <span class="stat-value">${teamStats.pts}</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">GF</span>
                                    <span class="stat-value">${teamStats.gf}</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">GA</span>
                                    <span class="stat-value">${teamStats.ga}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                card.innerHTML = `
                    <div class="group-header">Group ${letter}</div>
                    ${teamsHTML}
                `;
                
                container.appendChild(card);
            });
        }

        function parseMatchDate(dateString) {
            const parts = dateString.split(' ');
            const datePart = parts[0];
            const timePart = parts[1];
            const [month, day, year] = datePart.split('/');
            const [hours, minutes] = timePart.split(':');
            return new Date(year, month - 1, day, hours, minutes);
        }

        function getCountdown(matchDate) {
            const now = new Date();
            const diff = matchDate - now;
            
            if (diff < 0) return null;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            
            if (days > 0) {
                return `⏰ Kickoff in ${days} day${days !== 1 ? 's' : ''}, ${hours}h`;
            } else if (hours > 0) {
                return `⏰ Kickoff in ${hours}h ${minutes}m`;
            } else if (minutes > 0) {
                return `⏰ Kickoff in ${minutes} minute${minutes !== 1 ? 's' : ''}`;
            } else {
                return '⏰ Starting soon!';
            }
        }

        function formatMatchDate(dateString) {
            try {
                const matchDate = parseMatchDate(dateString);
                const options = { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                };
                return matchDate.toLocaleDateString('en-US', options);
            } catch (e) {
                return dateString;
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById('matchesGrid');
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px;">No matches found</p>';
                return;
            }

            matches.forEach(match => {
                const isLive = match.finished === 'FALSE' && 
                              match.time_elapsed !== 'notstarted' &&
                              match.time_elapsed !== 'FT';
                const isFinished = match.finished === 'TRUE' || match.time_elapsed === 'FT';
                const isUpcoming = !isLive && !isFinished;
                
                const homeTeam = match.home_team_name_en || match.home_team_label || 'TBD';
                const awayTeam = match.away_team_name_en || match.away_team_label || 'TBD';
                
                const stadium = stadiums.find(s => s.id === match.stadium_id);
                const stadiumName = stadium ? `${stadium.name_en}, ${stadium.city_en}` : '';
                
                let statusClass = 'upcoming';
                let statusText = 'Upcoming';
                if (isLive) {
                    statusClass = 'live';
                    statusText = `LIVE ${match.time_elapsed}'`;
                } else if (isFinished) {
                    statusClass = 'finished';
                    statusText = 'Finished';
                }
                
                const formattedDate = formatMatchDate(match.local_date);
                let countdownHTML = '';
                
                if (isUpcoming) {
                    try {
                        const matchDate = parseMatchDate(match.local_date);
                        const countdown = getCountdown(matchDate);
                        if (countdown) {
                            countdownHTML = `<div class="match-countdown">${countdown}</div>`;
                        }
                    } catch (e) {
                        console.log('Error parsing date:', e);
                    }
                }
                
                const card = document.createElement('div');
                card.className = `match-card ${isLive ? 'live' : ''}`;
                card.innerHTML = `
                    <div class="match-header">
                        <span class="match-group">${match.type?.toUpperCase() || 'Group'} ${match.group}</span>
                        <span class="match-status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="match-teams">
                        <div class="match-team">
                            <span class="team-name-match">${homeTeam}</span>
                            <span class="team-score">${match.home_score}</span>
                        </div>
                        <div class="match-team">
                            <span class="team-name-match">${awayTeam}</span>
                            <span class="team-score">${match.away_score}</span>
                        </div>
                    </div>
                    <div class="match-date ${isUpcoming ? 'upcoming' : ''}">${formattedDate}</div>
                    ${countdownHTML}
                    ${stadiumName ? `<div class="match-stadium">📍 ${stadiumName}</div>` : ''}
                `;
                
                container.appendChild(card);
            });
        }

        function refreshData() {
            hideError();
            fetchData();
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
