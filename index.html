<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Tournament Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            background: #16213e;
            border: 2px solid #0f3460;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover, .btn.active {
            background: #0f3460;
            border-color: #e94560;
        }

        #canvas {
            max-width: 95vmin;
            max-height: 95vmin;
            width: 800px;
            height: 800px;
            display: block;
            margin: 0 auto;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #e94560;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 FIFA World Cup 2026</h1>
        <div>Tournament Bracket Wheel</div>
    </div>

    <div class="controls">
        <button class="btn active" id="btnKnockout" onclick="showKnockout()">Knockout Stage</button>
        <button class="btn" id="btnGroups" onclick="showGroups()">Group Stage</button>
        <button class="btn" onclick="refresh()">🔄 Refresh</button>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>Loading tournament data...</div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>
    <div id="tooltip"></div>

    <script>
        const API_BASE = 'https://worldcup26.ir';
        let canvas, ctx;
        let allMatches = [], allTeams = [], allGroups = [];
        let currentView = 'knockout';
        let hoveredTeam = null;

        async function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas resolution
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.95;
            canvas.width = size;
            canvas.height = size;
            
            await fetchData();
        }

        async function fetchData() {
            try {
                const [matchesRes, teamsRes, groupsRes] = await Promise.all([
                    fetch(`${API_BASE}/get/games`),
                    fetch(`${API_BASE}/get/teams`),
                    fetch(`${API_BASE}/get/groups`)
                ]);

                const matchesData = await matchesRes.json();
                const teamsData = await teamsRes.json();
                const groupsData = await groupsRes.json();

                allMatches = matchesData.games || matchesData;
                allTeams = teamsData.teams || teamsData;
                allGroups = groupsData.groups || groupsData;

                console.log('Loaded:', allMatches.length, 'matches,', allTeams.length, 'teams');

                document.getElementById('loading').style.display = 'none';
                canvas.style.display = 'block';
                
                if (currentView === 'knockout') showKnockout();
                else showGroups();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = '<h3>⚠️ Connection Error</h3><p>Make sure you\'re serving via HTTP</p>';
            }
        }

        function showKnockout() {
            currentView = 'knockout';
            document.getElementById('btnKnockout').classList.add('active');
            document.getElementById('btnGroups').classList.remove('active');
            drawKnockout();
        }

        function showGroups() {
            currentView = 'groups';
            document.getElementById('btnGroups').classList.add('active');
            document.getElementById('btnKnockout').classList.remove('active');
            drawGroups();
        }

        function drawKnockout() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;

            ctx.clearRect(0, 0, w, h);

            // Rounds configuration
            const rounds = [
                { type: 'r32', name: 'R32', radius: 0.42, teamRadius: 0.45, color: '#e94560' },
                { type: 'r16', name: 'R16', radius: 0.32, teamRadius: 0.35, color: '#e85d75' },
                { type: 'qf', name: 'QF', radius: 0.22, teamRadius: 0.25, color: '#e67589' },
                { type: 'sf', name: 'SF', radius: 0.12, teamRadius: 0.15, color: '#e48d9e' }
            ];

            // Draw center trophy
            ctx.save();
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏆', cx, cy);
            ctx.font = 'bold 16px Arial';
            ctx.fillStyle = '#FFD700';
            ctx.fillText('FINAL', cx, cy + 40);
            ctx.restore();

            // Draw each round
            rounds.forEach((round, roundIdx) => {
                const matches = allMatches.filter(m => m.type === round.type);
                if (matches.length === 0) return;

                const radius = w * round.radius / 2;
                const teamRadius = w * round.teamRadius / 2;

                // Draw round circle guide
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();

                // Draw round label
                ctx.save();
                ctx.font = 'bold 14px Arial';
                ctx.fillStyle = round.color;
                ctx.textAlign = 'center';
                ctx.fillText(round.name, cx, cy - radius - 15);
                ctx.restore();

                // Draw matches
                matches.forEach((match, idx) => {
                    const angle = (idx / matches.length) * Math.PI * 2 - Math.PI / 2;
                    const mx = cx + radius * Math.cos(angle);
                    const my = cy + radius * Math.sin(angle);

                    // Team positions
                    const t1Angle = angle - 0.08;
                    const t2Angle = angle + 0.08;
                    const t1x = cx + teamRadius * Math.cos(t1Angle);
                    const t1y = cy + teamRadius * Math.sin(t1Angle);
                    const t2x = cx + teamRadius * Math.cos(t2Angle);
                    const t2y = cy + teamRadius * Math.sin(t2Angle);

                    // Draw lines from teams to match point
                    ctx.save();
                    ctx.strokeStyle = match.finished === 'TRUE' ? '#4ade80' : 'rgba(255, 255, 255, 0.2)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([]);
                    
                    ctx.beginPath();
                    ctx.moveTo(t1x, t1y);
                    ctx.lineTo(mx, my);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(t2x, t2y);
                    ctx.lineTo(mx, my);
                    ctx.stroke();
                    ctx.restore();

                    // Draw line to next round
                    if (roundIdx < rounds.length - 1) {
                        const nextRadius = w * rounds[roundIdx + 1].radius / 2;
                        const nextIdx = Math.floor(idx / 2);
                        const nextCount = allMatches.filter(m => m.type === rounds[roundIdx + 1].type).length;
                        const nextAngle = (nextIdx / nextCount) * Math.PI * 2 - Math.PI / 2;
                        const nx = cx + nextRadius * Math.cos(nextAngle);
                        const ny = cy + nextRadius * Math.sin(nextAngle);

                        ctx.save();
                        ctx.strokeStyle = match.finished === 'TRUE' ? '#4ade80' : 'rgba(255, 255, 255, 0.15)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(mx, my);
                        ctx.lineTo(nx, ny);
                        ctx.stroke();
                        ctx.restore();
                    } else {
                        // Connect to center
                        ctx.save();
                        ctx.strokeStyle = match.finished === 'TRUE' ? '#4ade80' : 'rgba(255, 255, 255, 0.15)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(mx, my);
                        ctx.lineTo(cx, cy);
                        ctx.stroke();
                        ctx.restore();
                    }

                    // Draw teams
                    const team1 = allTeams.find(t => t.id === match.home_team_id);
                    const team2 = allTeams.find(t => t.id === match.away_team_id);

                    drawTeamNode(t1x, t1y, team1, match, 'home');
                    drawTeamNode(t2x, t2y, team2, match, 'away');
                });
            });
        }

        function drawTeamNode(x, y, team, match, side) {
            const size = 30;

            // Determine if winner/loser
            let isWinner = false;
            let isEliminated = false;
            
            if (team && match && match.finished === 'TRUE') {
                const homeScore = parseInt(match.home_score);
                const awayScore = parseInt(match.away_score);
                if (side === 'home' && homeScore > awayScore) isWinner = true;
                if (side === 'away' && awayScore > homeScore) isWinner = true;
                if ((side === 'home' && homeScore < awayScore) || (side === 'away' && awayScore < homeScore)) {
                    isEliminated = true;
                }
            }

            ctx.save();
            
            // Draw circle
            ctx.beginPath();
            ctx.arc(x, y, size / 2, 0, Math.PI * 2);
            
            if (isWinner) {
                ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
                ctx.strokeStyle = '#4ade80';
                ctx.lineWidth = 3;
            } else if (isEliminated) {
                ctx.fillStyle = 'rgba(100, 100, 100, 0.2)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4;
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
            }
            
            ctx.fill();
            ctx.stroke();

            // Draw flag emoji or country code
            if (team) {
                ctx.font = 'bold 12px Arial';
                ctx.fillStyle = isEliminated ? 'rgba(255, 255, 255, 0.5)' : '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const code = team.fifa_code || team.name_en?.substring(0, 3).toUpperCase() || '?';
                ctx.fillText(code, x, y);
            } else {
                // TBD
                ctx.font = '10px Arial';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('TBD', x, y);
            }

            ctx.restore();
        }

        function drawGroups() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;

            ctx.clearRect(0, 0, w, h);

            // Draw center trophy
            ctx.save();
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏆', cx, cy);
            ctx.restore();

            const groupLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
            const radius = w * 0.38;

            groupLetters.forEach((letter, idx) => {
                const angle = (idx / groupLetters.length) * Math.PI * 2 - Math.PI / 2;
                const gx = cx + radius * Math.cos(angle);
                const gy = cy + radius * Math.sin(angle);

                // Draw line from center
                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(gx, gy);
                ctx.stroke();
                ctx.restore();

                // Draw group label
                ctx.save();
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = '#e94560';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`Group ${letter}`, gx, gy - 50);
                ctx.restore();

                // Get teams in group
                const teams = allTeams.filter(t => t.groups === letter);
                
                teams.forEach((team, teamIdx) => {
                    const teamAngle = angle + (teamIdx - 1.5) * 0.12;
                    const teamRadius = radius * 1.05;
                    const tx = cx + teamRadius * Math.cos(teamAngle);
                    const ty = cy + teamRadius * Math.sin(teamAngle);

                    // Draw team
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(tx, ty, 18, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();

                    ctx.font = 'bold 10px Arial';
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const code = team.fifa_code || team.name_en?.substring(0, 3).toUpperCase();
                    ctx.fillText(code, tx, ty);
                    ctx.restore();
                });
            });
        }

        function refresh() {
            document.getElementById('loading').style.display = 'block';
            canvas.style.display = 'none';
            fetchData();
        }

        // Start
        init();
        setInterval(() => fetchData(), 60000);
    </script>
</body>
</html>
